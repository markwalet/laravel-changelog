name: tests

on:
  push:
    branches:
      - 'main'
      - 'master'
  pull_request:
  schedule:
    - cron: '0 0 * * *'

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: [ 8.1, 8.2, 8.3, 8.4 ]
        illuminate: [ ^10.0, ^11.44.2, ^12.0, ^13.0 ]
        stability: [ prefer-lowest, prefer-stable ]
        include:
          - illuminate: ^10.0
            testbench: 8.*
          - illuminate: ^11.44.2
            testbench: ^9.13.0
          - illuminate: ^12.0
            testbench: 10.*
          - illuminate: ^13.0
            testbench: 11.*
        exclude:
          - php: 8.1
            illuminate: ^11.44.2
          - php: 8.1
            illuminate: ^12.0
          - php: 8.1
            illuminate: ^13.0
          - php: 8.2
            illuminate: ^13.0

    name: P${{ matrix.php }} - I${{ matrix.illuminate }} - ${{ matrix.stability }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, libxml, mbstring, zip, pcntl
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.illuminate }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Execute tests
        run: vendor/bin/phpunit

  tests-required:
    name: Tests Required
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - tests

    steps:
      - name: Verify test matrix completed successfully
        run: |
          if [ "${{ needs.tests.result }}" != "success" ]; then
            echo "Test matrix result: ${{ needs.tests.result }}"
            exit 1
          fi
